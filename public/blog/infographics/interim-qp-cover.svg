<text x="40" y="72" font-size="22" font-weight="700" fill="#042a63">Planning Interim QP Cover Before You Need It</text>
<line x1="66" y1="124" x2="66" y2="420" stroke="#dbe4ec" stroke-width="3"/><circle cx="66" cy="124" r="20" fill="url(#bg)"/><text x="66" y="130" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">1</text><text x="108" y="123" font-size="18" font-weight="600" fill="#042a63">Map single points of failure</text><text x="108" y="145" font-size="14" fill="#5f7283">Document where one named QP carries all certification.</text><circle cx="66" cy="222.66666666666669" r="20" fill="url(#bg)"/><text x="66" y="228.66666666666669" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">2</text><text x="108" y="221.66666666666669" font-size="18" font-weight="600" fill="#042a63">Pre-qualify an interim QP</text><text x="108" y="243.66666666666669" font-size="14" fill="#5f7283">Run due diligence and start the MHRA licence variation early.</text><circle cx="66" cy="321.33333333333337" r="20" fill="url(#bg)"/><text x="66" y="327.33333333333337" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">3</text><text x="108" y="320.33333333333337" font-size="18" font-weight="600" fill="#042a63">Keep technical agreement current</text><text x="108" y="342.33333333333337" font-size="14" fill="#5f7283">Make QP-to-QP responsibilities clear per EU GMP Chapter 7.</text><circle cx="66" cy="420" r="20" fill="url(#bg)"/><text x="66" y="426" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">4</text><text x="108" y="419" font-size="18" font-weight="600" fill="#042a63">Maintain audit-ready data room</text><text x="108" y="441" font-size="14" fill="#5f7283">Site Master File, validation and logs retrievable in hours.</text>
<text x="884" y="456" font-size="12" fill="#9aa7b4" text-anchor="end">Double Helix Pharma</text>
