<text x="40" y="72" font-size="26" font-weight="700" fill="#042a63">What a Quality Manual Must Contain</text>
<rect x="28" y="108" width="158.4" height="326" rx="12" fill="#f3f7fa" stroke="#e1e8ee"/><rect x="28" y="108" width="158.4" height="8" rx="4" fill="url(#bg)"/><text x="107.2" y="160" font-size="22" font-weight="700" fill="#0aa6e2" text-anchor="middle">1</text><text x="107.2" y="196" font-size="16" font-weight="600" fill="#042a63" text-anchor="middle">Scope &amp;</text><text x="107.2" y="218" font-size="16" font-weight="600" fill="#042a63" text-anchor="middle">Applicability</text><text x="107.2" y="250" font-size="12.5" fill="#5f7283" text-anchor="middle">Sites, activities,</text><text x="107.2" y="268" font-size="12.5" fill="#5f7283" text-anchor="middle">dosage forms and</text><text x="107.2" y="286" font-size="12.5" fill="#5f7283" text-anchor="middle">licences covered — and</text><text x="107.2" y="304" font-size="12.5" fill="#5f7283" text-anchor="middle">exclusions.</text><rect x="204.4" y="108" width="158.4" height="326" rx="12" fill="#f3f7fa" stroke="#e1e8ee"/><rect x="204.4" y="108" width="158.4" height="8" rx="4" fill="url(#bg)"/><text x="283.6" y="160" font-size="22" font-weight="700" fill="#0aa6e2" text-anchor="middle">2</text><text x="283.6" y="196" font-size="16" font-weight="600" fill="#042a63" text-anchor="middle">Quality Policy &amp;</text><text x="283.6" y="218" font-size="16" font-weight="600" fill="#042a63" text-anchor="middle">Objectives</text><text x="283.6" y="250" font-size="12.5" fill="#5f7283" text-anchor="middle">Senior management</text><text x="283.6" y="268" font-size="12.5" fill="#5f7283" text-anchor="middle">commitment with</text><text x="283.6" y="286" font-size="12.5" fill="#5f7283" text-anchor="middle">measurable,</text><text x="283.6" y="304" font-size="12.5" fill="#5f7283" text-anchor="middle">metric-linked</text><rect x="380.8" y="108" width="158.4" height="326" rx="12" fill="#f3f7fa" stroke="#e1e8ee"/><rect x="380.8" y="108" width="158.4" height="8" rx="4" fill="url(#bg)"/><text x="460" y="160" font-size="22" font-weight="700" fill="#0aa6e2" text-anchor="middle">3</text><text x="460" y="196" font-size="16" font-weight="600" fill="#042a63" text-anchor="middle">Organisation &amp;</text><text x="460" y="218" font-size="16" font-weight="600" fill="#042a63" text-anchor="middle">Responsibilities</text><text x="460" y="250" font-size="12.5" fill="#5f7283" text-anchor="middle">QP, RP, site management</text><text x="460" y="268" font-size="12.5" fill="#5f7283" text-anchor="middle">and quality unit roles</text><text x="460" y="286" font-size="12.5" fill="#5f7283" text-anchor="middle">and independence.</text><rect x="557.2" y="108" width="158.4" height="326" rx="12" fill="#f3f7fa" stroke="#e1e8ee"/><rect x="557.2" y="108" width="158.4" height="8" rx="4" fill="url(#bg)"/><text x="636.4000000000001" y="160" font-size="22" font-weight="700" fill="#0aa6e2" text-anchor="middle">4</text><text x="636.4000000000001" y="196" font-size="16" font-weight="600" fill="#042a63" text-anchor="middle">The PQS Elements</text><text x="636.4000000000001" y="250" font-size="12.5" fill="#5f7283" text-anchor="middle">Four ICH Q10 elements</text><text x="636.4000000000001" y="268" font-size="12.5" fill="#5f7283" text-anchor="middle">cross-referenced to</text><text x="636.4000000000001" y="286" font-size="12.5" fill="#5f7283" text-anchor="middle">governing procedures.</text><rect x="733.6" y="108" width="158.4" height="326" rx="12" fill="#f3f7fa" stroke="#e1e8ee"/><rect x="733.6" y="108" width="158.4" height="8" rx="4" fill="url(#bg)"/><text x="812.8000000000001" y="160" font-size="22" font-weight="700" fill="#0aa6e2" text-anchor="middle">5</text><text x="812.8000000000001" y="196" font-size="16" font-weight="600" fill="#042a63" text-anchor="middle">Risk Management</text><text x="812.8000000000001" y="250" font-size="12.5" fill="#5f7283" text-anchor="middle">How ICH Q9 principles</text><text x="812.8000000000001" y="268" font-size="12.5" fill="#5f7283" text-anchor="middle">inform decisions across</text><text x="812.8000000000001" y="286" font-size="12.5" fill="#5f7283" text-anchor="middle">the lifecycle.</text>
<text x="884" y="456" font-size="12" fill="#9aa7b4" text-anchor="end">Double Helix Pharma</text>
