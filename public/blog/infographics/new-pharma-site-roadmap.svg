<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#7cc63f"/><stop offset="0.54" stop-color="#0aa6e2"/><stop offset="1" stop-color="#042a63"/></linearGradient></defs>
<rect x="1.5" y="1.5" width="917" height="477" rx="18" fill="#ffffff" stroke="#e1e8ee" stroke-width="1.5"/>
<rect x="40" y="34" width="46" height="6" rx="3" fill="url(#bg)"/>
<text x="40" y="72" font-size="26" font-weight="700" fill="#042a63">New Pharma Site: Readiness Roadmap</text>
<line x1="66" y1="124" x2="66" y2="420" stroke="#dbe4ec" stroke-width="3"/><circle cx="66" cy="124" r="20" fill="url(#bg)"/><text x="66" y="130" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">1</text><text x="108" y="123" font-size="18" font-weight="600" fill="#042a63">Define and design</text><text x="108" y="145" font-size="14" fill="#5f7283">Lock scope, licence strategy, URS and an initial risk assessment.</text><circle cx="66" cy="198" r="20" fill="url(#bg)"/><text x="66" y="204" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">2</text><text x="108" y="197" font-size="18" font-weight="600" fill="#042a63">Build the quality system</text><text x="108" y="219" font-size="14" fill="#5f7283">Stand up core GMP/GDP systems and documentation before operations.</text><circle cx="66" cy="272" r="20" fill="url(#bg)"/><text x="66" y="278" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">3</text><text x="108" y="271" font-size="18" font-weight="600" fill="#042a63">Construct and qualify</text><text x="108" y="293" font-size="14" fill="#5f7283">Complete the facility, then run DQ, IQ, OQ and PQ under a VMP.</text><circle cx="66" cy="346" r="20" fill="url(#bg)"/><text x="66" y="352" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">4</text><text x="108" y="345" font-size="18" font-weight="600" fill="#042a63">Operate and generate evidence</text><text x="108" y="367" font-size="14" fill="#5f7283">Run deviations, change control, CAPA and self-inspections for real.</text><circle cx="66" cy="420" r="20" fill="url(#bg)"/><text x="66" y="426" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">5</text><text x="108" y="419" font-size="18" font-weight="600" fill="#042a63">Verify readiness</text><text x="108" y="441" font-size="14" fill="#5f7283">Independent mock inspection, remediate, then host the MHRA.</text>
<text x="884" y="456" font-size="12" fill="#9aa7b4" text-anchor="end">Double Helix Pharma</text>
</svg>