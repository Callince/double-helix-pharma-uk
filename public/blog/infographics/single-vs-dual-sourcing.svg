<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#7cc63f"/><stop offset="0.54" stop-color="#0aa6e2"/><stop offset="1" stop-color="#042a63"/></linearGradient></defs>
<rect x="1.5" y="1.5" width="917" height="477" rx="18" fill="#ffffff" stroke="#e1e8ee" stroke-width="1.5"/>
<rect x="40" y="34" width="46" height="6" rx="3" fill="url(#bg)"/>
<text x="40" y="72" font-size="26" font-weight="700" fill="#042a63">Single vs Dual Sourcing: Supply Risk</text>
<rect x="36" y="104" width="406" height="332" rx="14" fill="#ffffff" stroke="#e1e8ee"/><path d="M50 104 h378 a14 14 0 0 1 14 14 v34 h-406 v-34 a14 14 0 0 1 14 -14 z" fill="#0aa6e2"/><text x="239" y="135" font-size="17" font-weight="700" fill="#fff" text-anchor="middle">Single Sourcing</text><circle cx="62" cy="184" r="3.5" fill="#0aa6e2"/><text x="78" y="188" font-size="13.5" fill="#243748">Fewer audits, tighter technical alignment</text><circle cx="62" cy="230" r="3.5" fill="#0aa6e2"/><text x="78" y="234" font-size="13.5" fill="#243748">Simpler change control, stronger leverage</text><circle cx="62" cy="276" r="3.5" fill="#0aa6e2"/><text x="78" y="280" font-size="13.5" fill="#243748">Single point of failure halts supply</text><circle cx="62" cy="322" r="3.5" fill="#0aa6e2"/><text x="78" y="326" font-size="13.5" fill="#243748">Needs safety stock, escrow and tested BCP</text><circle cx="62" cy="368" r="3.5" fill="#0aa6e2"/><text x="78" y="372" font-size="13.5" fill="#243748">Acceptable only when justified and</text><text x="78" y="389" font-size="13.5" fill="#243748">documented</text><rect x="478" y="104" width="406" height="332" rx="14" fill="#ffffff" stroke="#e1e8ee"/><path d="M492 104 h378 a14 14 0 0 1 14 14 v34 h-406 v-34 a14 14 0 0 1 14 -14 z" fill="#2f8f3a"/><text x="681" y="135" font-size="17" font-weight="700" fill="#fff" text-anchor="middle">Dual Sourcing</text><circle cx="504" cy="184" r="3.5" fill="#2f8f3a"/><text x="520" y="188" font-size="13.5" fill="#243748">Resilience by design; loss of one source</text><text x="520" y="205" font-size="13.5" fill="#243748">survivable</text><circle cx="504" cy="230" r="3.5" fill="#2f8f3a"/><text x="520" y="234" font-size="13.5" fill="#243748">Increasingly expected for critical materials</text><circle cx="504" cy="276" r="3.5" fill="#2f8f3a"/><text x="520" y="280" font-size="13.5" fill="#243748">Higher qualification and oversight costs</text><circle cx="504" cy="322" r="3.5" fill="#2f8f3a"/><text x="520" y="326" font-size="13.5" fill="#243748">Comparability and stability burden between</text><text x="520" y="343" font-size="13.5" fill="#243748">sources</text><circle cx="504" cy="368" r="3.5" fill="#2f8f3a"/><text x="520" y="372" font-size="13.5" fill="#243748">Not set and forget; sustain the controls</text><circle cx="460" cy="270" r="25" fill="#042a63"/><text x="460" y="276" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">VS</text>
<text x="884" y="456" font-size="12" fill="#9aa7b4" text-anchor="end">Double Helix Pharma</text>
</svg>