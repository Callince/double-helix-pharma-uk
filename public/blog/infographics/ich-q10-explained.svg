<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#7cc63f"/><stop offset="0.54" stop-color="#0aa6e2"/><stop offset="1" stop-color="#042a63"/></linearGradient></defs>
<rect x="1.5" y="1.5" width="917" height="477" rx="18" fill="#ffffff" stroke="#e1e8ee" stroke-width="1.5"/>
<rect x="40" y="34" width="46" height="6" rx="3" fill="url(#bg)"/>
<text x="40" y="72" font-size="26" font-weight="700" fill="#042a63">The Four Elements of ICH Q10</text>
<rect x="28" y="108" width="202.5" height="326" rx="12" fill="#f3f7fa" stroke="#e1e8ee"/><rect x="28" y="108" width="202.5" height="8" rx="4" fill="url(#bg)"/><text x="129.25" y="160" font-size="22" font-weight="700" fill="#0aa6e2" text-anchor="middle">1</text><text x="129.25" y="196" font-size="16" font-weight="600" fill="#042a63" text-anchor="middle">Process Monitoring</text><text x="129.25" y="250" font-size="12.5" fill="#5f7283" text-anchor="middle">Confirms processes stay in a</text><text x="129.25" y="268" font-size="12.5" fill="#5f7283" text-anchor="middle">state of control via defined</text><text x="129.25" y="286" font-size="12.5" fill="#5f7283" text-anchor="middle">parameters</text><rect x="248.5" y="108" width="202.5" height="326" rx="12" fill="#f3f7fa" stroke="#e1e8ee"/><rect x="248.5" y="108" width="202.5" height="8" rx="4" fill="url(#bg)"/><text x="349.75" y="160" font-size="22" font-weight="700" fill="#0aa6e2" text-anchor="middle">2</text><text x="349.75" y="196" font-size="16" font-weight="600" fill="#042a63" text-anchor="middle">CAPA System</text><text x="349.75" y="250" font-size="12.5" fill="#5f7283" text-anchor="middle">Investigates deviations and</text><text x="349.75" y="268" font-size="12.5" fill="#5f7283" text-anchor="middle">complaints, scaled to the level</text><text x="349.75" y="286" font-size="12.5" fill="#5f7283" text-anchor="middle">of risk</text><rect x="469" y="108" width="202.5" height="326" rx="12" fill="#f3f7fa" stroke="#e1e8ee"/><rect x="469" y="108" width="202.5" height="8" rx="4" fill="url(#bg)"/><text x="570.25" y="160" font-size="22" font-weight="700" fill="#0aa6e2" text-anchor="middle">3</text><text x="570.25" y="196" font-size="16" font-weight="600" fill="#042a63" text-anchor="middle">Change Management</text><text x="570.25" y="250" font-size="12.5" fill="#5f7283" text-anchor="middle">Evaluates and implements change</text><text x="570.25" y="268" font-size="12.5" fill="#5f7283" text-anchor="middle">using product and process</text><text x="570.25" y="286" font-size="12.5" fill="#5f7283" text-anchor="middle">knowledge</text><rect x="689.5" y="108" width="202.5" height="326" rx="12" fill="#f3f7fa" stroke="#e1e8ee"/><rect x="689.5" y="108" width="202.5" height="8" rx="4" fill="url(#bg)"/><text x="790.75" y="160" font-size="22" font-weight="700" fill="#0aa6e2" text-anchor="middle">4</text><text x="790.75" y="196" font-size="16" font-weight="600" fill="#042a63" text-anchor="middle">Management Review</text><text x="790.75" y="250" font-size="12.5" fill="#5f7283" text-anchor="middle">Senior management reviews</text><text x="790.75" y="268" font-size="12.5" fill="#5f7283" text-anchor="middle">performance so issues are</text><text x="790.75" y="286" font-size="12.5" fill="#5f7283" text-anchor="middle">escalated and resourced</text>
<text x="884" y="456" font-size="12" fill="#9aa7b4" text-anchor="end">Double Helix Pharma</text>
</svg>