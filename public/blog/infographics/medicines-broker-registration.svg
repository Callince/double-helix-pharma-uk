<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#7cc63f"/><stop offset="0.54" stop-color="#0aa6e2"/><stop offset="1" stop-color="#042a63"/></linearGradient></defs>
<rect x="1.5" y="1.5" width="917" height="477" rx="18" fill="#ffffff" stroke="#e1e8ee" stroke-width="1.5"/>
<rect x="40" y="34" width="46" height="6" rx="3" fill="url(#bg)"/>
<text x="40" y="72" font-size="26" font-weight="700" fill="#042a63">Three Pillars of Broker Compliance</text>
<rect x="28" y="108" width="276" height="326" rx="12" fill="#f3f7fa" stroke="#e1e8ee"/><rect x="28" y="108" width="276" height="8" rx="4" fill="url(#bg)"/><text x="166" y="160" font-size="22" font-weight="700" fill="#0aa6e2" text-anchor="middle">1</text><text x="166" y="196" font-size="16" font-weight="600" fill="#042a63" text-anchor="middle">Classify Activity Correctly</text><text x="166" y="250" font-size="12.5" fill="#5f7283" text-anchor="middle">Broking, not wholesale: never own, hold or</text><text x="166" y="268" font-size="12.5" fill="#5f7283" text-anchor="middle">supply stock.</text><rect x="322" y="108" width="276" height="326" rx="12" fill="#f3f7fa" stroke="#e1e8ee"/><rect x="322" y="108" width="276" height="8" rx="4" fill="url(#bg)"/><text x="460" y="160" font-size="22" font-weight="700" fill="#0aa6e2" text-anchor="middle">2</text><text x="460" y="196" font-size="16" font-weight="600" fill="#042a63" text-anchor="middle">GDP Quality System</text><text x="460" y="250" font-size="12.5" fill="#5f7283" text-anchor="middle">Real, proportionate, documented system per</text><text x="460" y="268" font-size="12.5" fill="#5f7283" text-anchor="middle">ICH Q9 and Q10.</text><rect x="616" y="108" width="276" height="326" rx="12" fill="#f3f7fa" stroke="#e1e8ee"/><rect x="616" y="108" width="276" height="8" rx="4" fill="url(#bg)"/><text x="754" y="160" font-size="22" font-weight="700" fill="#0aa6e2" text-anchor="middle">3</text><text x="754" y="196" font-size="16" font-weight="600" fill="#042a63" text-anchor="middle">Counterparty Qualification</text><text x="754" y="250" font-size="12.5" fill="#5f7283" text-anchor="middle">Verify both sides; evidence with dated</text><text x="754" y="268" font-size="12.5" fill="#5f7283" text-anchor="middle">ALCOA+ records.</text>
<text x="884" y="456" font-size="12" fill="#9aa7b4" text-anchor="end">Double Helix Pharma</text>
</svg>