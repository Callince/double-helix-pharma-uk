<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#7cc63f"/><stop offset="0.54" stop-color="#0aa6e2"/><stop offset="1" stop-color="#042a63"/></linearGradient></defs>
<rect x="1.5" y="1.5" width="917" height="477" rx="18" fill="#ffffff" stroke="#e1e8ee" stroke-width="1.5"/>
<rect x="40" y="34" width="46" height="6" rx="3" fill="url(#bg)"/>
<text x="40" y="72" font-size="26" font-weight="700" fill="#042a63">How to Choose an eQMS</text>
<line x1="66" y1="124" x2="66" y2="420" stroke="#dbe4ec" stroke-width="3"/><circle cx="66" cy="124" r="20" fill="url(#bg)"/><text x="66" y="130" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">1</text><text x="108" y="123" font-size="18" font-weight="600" fill="#042a63">Start with process</text><text x="108" y="145" font-size="14" fill="#5f7283">Map and rationalise workflows before evaluating any features</text><circle cx="66" cy="183.2" r="20" fill="url(#bg)"/><text x="66" y="189.2" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">2</text><text x="108" y="182.2" font-size="18" font-weight="600" fill="#042a63">Define requirements</text><text x="108" y="204.2" font-size="14" fill="#5f7283">Separate mandatory from desirable; align to ICH Q10 records</text><circle cx="66" cy="242.4" r="20" fill="url(#bg)"/><text x="66" y="248.4" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">3</text><text x="108" y="241.4" font-size="18" font-weight="600" fill="#042a63">Demand data integrity</text><text x="108" y="263.4" font-size="14" fill="#5f7283">ALCOA+, audit trails, e-signatures and Annex 11 validation</text><circle cx="66" cy="301.6" r="20" fill="url(#bg)"/><text x="66" y="307.6" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">4</text><text x="108" y="300.6" font-size="18" font-weight="600" fill="#042a63">Qualify the vendor</text><text x="108" y="322.6" font-size="14" fill="#5f7283">Treat SaaS supplier as critical; pin down data ownership</text><circle cx="66" cy="360.8" r="20" fill="url(#bg)"/><text x="66" y="366.8" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">5</text><text x="108" y="359.8" font-size="18" font-weight="600" fill="#042a63">Score, don't be sold</text><text x="108" y="381.8" font-size="14" fill="#5f7283">Weighted scoring against total cost of ownership, not the demo</text><circle cx="66" cy="420" r="20" fill="url(#bg)"/><text x="66" y="426" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">6</text><text x="108" y="419" font-size="18" font-weight="600" fill="#042a63">Plan migration &amp; governance</text><text x="108" y="441" font-size="14" fill="#5f7283">Verified data migration and ongoing validated-state control</text>
<text x="884" y="456" font-size="12" fill="#9aa7b4" text-anchor="end">Double Helix Pharma</text>
</svg>