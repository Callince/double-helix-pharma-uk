<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#7cc63f"/><stop offset="0.54" stop-color="#0aa6e2"/><stop offset="1" stop-color="#042a63"/></linearGradient></defs>
<rect x="1.5" y="1.5" width="917" height="477" rx="18" fill="#ffffff" stroke="#e1e8ee" stroke-width="1.5"/>
<rect x="40" y="34" width="46" height="6" rx="3" fill="url(#bg)"/>
<text x="40" y="72" font-size="26" font-weight="700" fill="#042a63">The Supplier Qualification Process</text>
<line x1="66" y1="124" x2="66" y2="420" stroke="#dbe4ec" stroke-width="3"/><circle cx="66" cy="124" r="20" fill="url(#bg)"/><text x="66" y="130" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">1</text><text x="108" y="123" font-size="18" font-weight="600" fill="#042a63">Define &amp; Classify by Risk</text><text x="108" y="145" font-size="14" fill="#5f7283">Specify the need and assign a criticality tier per ICH Q9.</text><circle cx="66" cy="222.66666666666669" r="20" fill="url(#bg)"/><text x="66" y="228.66666666666669" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">2</text><text x="108" y="221.66666666666669" font-size="18" font-weight="600" fill="#042a63">Assess the Supplier</text><text x="108" y="243.66666666666669" font-size="14" fill="#5f7283">Questionnaires, documentation, certificates and risk-based audits.</text><circle cx="66" cy="321.33333333333337" r="20" fill="url(#bg)"/><text x="66" y="327.33333333333337" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">3</text><text x="108" y="320.33333333333337" font-size="18" font-weight="600" fill="#042a63">Approve &amp; Contract</text><text x="108" y="342.33333333333337" font-size="14" fill="#5f7283">Quality sign-off plus a written quality agreement; add to ASL.</text><circle cx="66" cy="420" r="20" fill="url(#bg)"/><text x="66" y="426" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">4</text><text x="108" y="419" font-size="18" font-weight="600" fill="#042a63">Monitor &amp; Re-qualify</text><text x="108" y="441" font-size="14" fill="#5f7283">Track performance and re-qualify on a risk basis.</text>
<text x="884" y="456" font-size="12" fill="#9aa7b4" text-anchor="end">Double Helix Pharma</text>
</svg>