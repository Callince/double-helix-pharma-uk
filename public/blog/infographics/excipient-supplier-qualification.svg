<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#7cc63f"/><stop offset="0.54" stop-color="#0aa6e2"/><stop offset="1" stop-color="#042a63"/></linearGradient></defs>
<rect x="1.5" y="1.5" width="917" height="477" rx="18" fill="#ffffff" stroke="#e1e8ee" stroke-width="1.5"/>
<rect x="40" y="34" width="46" height="6" rx="3" fill="url(#bg)"/>
<text x="40" y="72" font-size="22" font-weight="700" fill="#042a63">Excipient Supplier Qualification Lifecycle</text>
<line x1="66" y1="124" x2="66" y2="420" stroke="#dbe4ec" stroke-width="3"/><circle cx="66" cy="124" r="20" fill="url(#bg)"/><text x="66" y="130" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">1</text><text x="108" y="123" font-size="18" font-weight="600" fill="#042a63">Formalised risk assessment</text><text x="108" y="145" font-size="14" fill="#5f7283">Rate the excipient and supply chain under ICH Q9 to set a risk tier</text><circle cx="66" cy="198" r="20" fill="url(#bg)"/><text x="66" y="204" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">2</text><text x="108" y="197" font-size="18" font-weight="600" fill="#042a63">Build qualification dossier</text><text x="108" y="219" font-size="14" fill="#5f7283">Gather questionnaire, GMP certs, CoA and full supply-chain map</text><circle cx="66" cy="272" r="20" fill="url(#bg)"/><text x="66" y="278" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">3</text><text x="108" y="271" font-size="18" font-weight="600" fill="#042a63">Audit the manufacturer</text><text x="108" y="293" font-size="14" fill="#5f7283">On-site audit for critical suppliers, not just the distributor</text><circle cx="66" cy="346" r="20" fill="url(#bg)"/><text x="66" y="352" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">4</text><text x="108" y="345" font-size="18" font-weight="600" fill="#042a63">Control approved material</text><text x="108" y="367" font-size="14" fill="#5f7283">Identity testing, quality agreements and change notification</text><circle cx="66" cy="420" r="20" fill="url(#bg)"/><text x="66" y="426" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">5</text><text x="108" y="419" font-size="18" font-weight="600" fill="#042a63">Monitor and re-qualify</text><text x="108" y="441" font-size="14" fill="#5f7283">Track performance and re-qualify on a risk-driven cycle</text>
<text x="884" y="456" font-size="12" fill="#9aa7b4" text-anchor="end">Double Helix Pharma</text>
</svg>