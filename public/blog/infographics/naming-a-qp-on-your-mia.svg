<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#7cc63f"/><stop offset="0.54" stop-color="#0aa6e2"/><stop offset="1" stop-color="#042a63"/></linearGradient></defs>
<rect x="1.5" y="1.5" width="917" height="477" rx="18" fill="#ffffff" stroke="#e1e8ee" stroke-width="1.5"/>
<rect x="40" y="34" width="46" height="6" rx="3" fill="url(#bg)"/>
<text x="40" y="72" font-size="26" font-weight="700" fill="#042a63">How to Name a QP on Your Licence</text>
<line x1="66" y1="124" x2="66" y2="420" stroke="#dbe4ec" stroke-width="3"/><circle cx="66" cy="124" r="20" fill="url(#bg)"/><text x="66" y="130" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">1</text><text x="108" y="123" font-size="18" font-weight="600" fill="#042a63">Confirm eligibility and scope</text><text x="108" y="145" font-size="14" fill="#5f7283">Map the QP's qualifications and experience to your product types</text><circle cx="66" cy="198" r="20" fill="url(#bg)"/><text x="66" y="204" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">2</text><text x="108" y="197" font-size="18" font-weight="600" fill="#042a63">Define authority in writing</text><text x="108" y="219" font-size="14" fill="#5f7283">Set reporting line, decision rights and access to batch data</text><circle cx="66" cy="272" r="20" fill="url(#bg)"/><text x="66" y="278" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">3</text><text x="108" y="271" font-size="18" font-weight="600" fill="#042a63">Set out arrangements clearly</text><text x="108" y="293" font-size="14" fill="#5f7283">Agree scope, deputising and availability for contract or multi-site</text><circle cx="66" cy="346" r="20" fill="url(#bg)"/><text x="66" y="352" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">4</text><text x="108" y="345" font-size="18" font-weight="600" fill="#042a63">Submit the variation</text><text x="108" y="367" font-size="14" fill="#5f7283">Add or change the named QP via the MHRA licence variation</text><circle cx="66" cy="420" r="20" fill="url(#bg)"/><text x="66" y="426" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">5</text><text x="108" y="419" font-size="18" font-weight="600" fill="#042a63">Brief and embed</text><text x="108" y="441" font-size="14" fill="#5f7283">Induct the QP into site, systems and product before certifying</text>
<text x="884" y="456" font-size="12" fill="#9aa7b4" text-anchor="end">Double Helix Pharma</text>
</svg>