<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#7cc63f"/><stop offset="0.54" stop-color="#0aa6e2"/><stop offset="1" stop-color="#042a63"/></linearGradient></defs>
<rect x="1.5" y="1.5" width="917" height="477" rx="18" fill="#ffffff" stroke="#e1e8ee" stroke-width="1.5"/>
<rect x="40" y="34" width="46" height="6" rx="3" fill="url(#bg)"/>
<text x="40" y="72" font-size="26" font-weight="700" fill="#042a63">Registered Broker Compliance Checklist</text>
<circle cx="62" cy="124" r="16" fill="#eaf6ee" stroke="#2f8f3a" stroke-width="1.5"/><path d="M54 124 l5 6 l11 -12" fill="none" stroke="#2f8f3a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><text x="92" y="123" font-size="17" font-weight="600" fill="#042a63">Register with the MHRA</text><text x="92" y="143" font-size="13.5" fill="#5f7283">Register before trading and appear on the public register</text><circle cx="62" cy="180" r="16" fill="#eaf6ee" stroke="#2f8f3a" stroke-width="1.5"/><path d="M54 180 l5 6 l11 -12" fill="none" stroke="#2f8f3a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><text x="92" y="179" font-size="17" font-weight="600" fill="#042a63">Operate a quality system</text><text x="92" y="199" font-size="13.5" fill="#5f7283">Proportionate but genuine, with defined responsibilities and risk management</text><circle cx="62" cy="236" r="16" fill="#eaf6ee" stroke="#2f8f3a" stroke-width="1.5"/><path d="M54 236 l5 6 l11 -12" fill="none" stroke="#2f8f3a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><text x="92" y="235" font-size="17" font-weight="600" fill="#042a63">Verify both counterparties</text><text x="92" y="255" font-size="13.5" fill="#5f7283">Confirm supplier and recipient are legally authorised to deal</text><circle cx="62" cy="292" r="16" fill="#eaf6ee" stroke="#2f8f3a" stroke-width="1.5"/><path d="M54 292 l5 6 l11 -12" fill="none" stroke="#2f8f3a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><text x="92" y="291" font-size="17" font-weight="600" fill="#042a63">Recall &amp; complaint procedures</text><text x="92" y="311" font-size="13.5" fill="#5f7283">Working processes to act on recalls, complaints and withdrawals</text><circle cx="62" cy="348" r="16" fill="#eaf6ee" stroke="#2f8f3a" stroke-width="1.5"/><path d="M54 348 l5 6 l11 -12" fill="none" stroke="#2f8f3a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><text x="92" y="347" font-size="17" font-weight="600" fill="#042a63">Report falsified medicines</text><text x="92" y="367" font-size="13.5" fill="#5f7283">Inform the authority and MA holder of suspected falsified products</text><circle cx="62" cy="404" r="16" fill="#eaf6ee" stroke="#2f8f3a" stroke-width="1.5"/><path d="M54 404 l5 6 l11 -12" fill="none" stroke="#2f8f3a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><text x="92" y="403" font-size="17" font-weight="600" fill="#042a63">Keep traceable records</text><text x="92" y="423" font-size="13.5" fill="#5f7283">Reconstruct the product pathway; meet ALCOA+ for inspection</text>
<text x="884" y="456" font-size="12" fill="#9aa7b4" text-anchor="end">Double Helix Pharma</text>
</svg>