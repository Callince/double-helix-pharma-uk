<text x="40" y="72" font-size="26" font-weight="700" fill="#042a63">Top Recurring GMP Audit Findings</text>
<circle cx="62" cy="124" r="16" fill="#eaf6ee" stroke="#2f8f3a" stroke-width="1.5"/><path d="M54 124 l5 6 l11 -12" fill="none" stroke="#2f8f3a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><text x="92" y="123" font-size="17" font-weight="600" fill="#042a63">Data integrity &amp; ALCOA+</text><text x="92" y="143" font-size="13.5" fill="#5f7283">Shared logins, unreviewed audit trails, overwritten records</text><circle cx="62" cy="180" r="16" fill="#eaf6ee" stroke="#2f8f3a" stroke-width="1.5"/><path d="M54 180 l5 6 l11 -12" fill="none" stroke="#2f8f3a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><text x="92" y="179" font-size="17" font-weight="600" fill="#042a63">Deviation &amp; OOS investigations</text><text x="92" y="199" font-size="13.5" fill="#5f7283">Investigations that stop at the first cause; open backlogs</text><circle cx="62" cy="236" r="16" fill="#eaf6ee" stroke="#2f8f3a" stroke-width="1.5"/><path d="M54 236 l5 6 l11 -12" fill="none" stroke="#2f8f3a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><text x="92" y="235" font-size="17" font-weight="600" fill="#042a63">Poor CAPA management</text><text x="92" y="255" font-size="13.5" fill="#5f7283">Corrections not corrective actions; no effectiveness checks</text><circle cx="62" cy="292" r="16" fill="#eaf6ee" stroke="#2f8f3a" stroke-width="1.5"/><path d="M54 292 l5 6 l11 -12" fill="none" stroke="#2f8f3a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><text x="92" y="291" font-size="17" font-weight="600" fill="#042a63">SOPs vs actual practice</text><text x="92" y="311" font-size="13.5" fill="#5f7283">Uncontrolled copies, expired reviews, missing versions</text><circle cx="62" cy="348" r="16" fill="#eaf6ee" stroke="#2f8f3a" stroke-width="1.5"/><path d="M54 348 l5 6 l11 -12" fill="none" stroke="#2f8f3a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><text x="92" y="347" font-size="17" font-weight="600" fill="#042a63">Contamination control &amp; Annex 1</text><text x="92" y="367" font-size="13.5" fill="#5f7283">No holistic CCS; weak aseptic technique and gowning</text><circle cx="62" cy="404" r="16" fill="#eaf6ee" stroke="#2f8f3a" stroke-width="1.5"/><path d="M54 404 l5 6 l11 -12" fill="none" stroke="#2f8f3a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><text x="92" y="403" font-size="17" font-weight="600" fill="#042a63">Supplier &amp; self-inspection gaps</text><text x="92" y="423" font-size="13.5" fill="#5f7283">Unqualified suppliers, stale agreements, superficial audits</text>
