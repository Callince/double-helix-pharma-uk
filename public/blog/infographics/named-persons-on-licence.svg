<text x="40" y="72" font-size="26" font-weight="700" fill="#042a63">Named Roles on an MIA or WDA</text>
<rect x="28" y="108" width="158.4" height="326" rx="12" fill="#f3f7fa" stroke="#e1e8ee"/><rect x="28" y="108" width="158.4" height="8" rx="4" fill="url(#bg)"/><text x="107.2" y="160" font-size="22" font-weight="700" fill="#0aa6e2" text-anchor="middle">1</text><text x="107.2" y="196" font-size="16" font-weight="600" fill="#042a63" text-anchor="middle">Qualified Person</text><text x="107.2" y="218" font-size="16" font-weight="600" fill="#042a63" text-anchor="middle">(QP)</text><text x="107.2" y="250" font-size="12.5" fill="#5f7283" text-anchor="middle">Certifies and releases</text><text x="107.2" y="268" font-size="12.5" fill="#5f7283" text-anchor="middle">each batch under EU GMP</text><text x="107.2" y="286" font-size="12.5" fill="#5f7283" text-anchor="middle">Annex 16</text><rect x="204.4" y="108" width="158.4" height="326" rx="12" fill="#f3f7fa" stroke="#e1e8ee"/><rect x="204.4" y="108" width="158.4" height="8" rx="4" fill="url(#bg)"/><text x="283.6" y="160" font-size="22" font-weight="700" fill="#0aa6e2" text-anchor="middle">2</text><text x="283.6" y="196" font-size="16" font-weight="600" fill="#042a63" text-anchor="middle">Responsible Person</text><text x="283.6" y="218" font-size="16" font-weight="600" fill="#042a63" text-anchor="middle">(RP)</text><text x="283.6" y="250" font-size="12.5" fill="#5f7283" text-anchor="middle">Owns Good Distribution</text><text x="283.6" y="268" font-size="12.5" fill="#5f7283" text-anchor="middle">Practice across the</text><text x="283.6" y="286" font-size="12.5" fill="#5f7283" text-anchor="middle">supply chain</text><rect x="380.8" y="108" width="158.4" height="326" rx="12" fill="#f3f7fa" stroke="#e1e8ee"/><rect x="380.8" y="108" width="158.4" height="8" rx="4" fill="url(#bg)"/><text x="460" y="160" font-size="22" font-weight="700" fill="#0aa6e2" text-anchor="middle">3</text><text x="460" y="196" font-size="16" font-weight="600" fill="#042a63" text-anchor="middle">Responsible Person</text><text x="460" y="218" font-size="16" font-weight="600" fill="#042a63" text-anchor="middle">(import)</text><text x="460" y="250" font-size="12.5" fill="#5f7283" text-anchor="middle">Assures QP certification</text><text x="460" y="268" font-size="12.5" fill="#5f7283" text-anchor="middle">before GB market entry</text><rect x="557.2" y="108" width="158.4" height="326" rx="12" fill="#f3f7fa" stroke="#e1e8ee"/><rect x="557.2" y="108" width="158.4" height="8" rx="4" fill="url(#bg)"/><text x="636.4000000000001" y="160" font-size="22" font-weight="700" fill="#0aa6e2" text-anchor="middle">4</text><text x="636.4000000000001" y="196" font-size="16" font-weight="600" fill="#042a63" text-anchor="middle">Head of Production</text><text x="636.4000000000001" y="250" font-size="12.5" fill="#5f7283" text-anchor="middle">Runs manufacturing,</text><text x="636.4000000000001" y="268" font-size="12.5" fill="#5f7283" text-anchor="middle">independent of quality</text><text x="636.4000000000001" y="286" font-size="12.5" fill="#5f7283" text-anchor="middle">control</text><rect x="733.6" y="108" width="158.4" height="326" rx="12" fill="#f3f7fa" stroke="#e1e8ee"/><rect x="733.6" y="108" width="158.4" height="8" rx="4" fill="url(#bg)"/><text x="812.8000000000001" y="160" font-size="22" font-weight="700" fill="#0aa6e2" text-anchor="middle">5</text><text x="812.8000000000001" y="196" font-size="16" font-weight="600" fill="#042a63" text-anchor="middle">Head of Quality</text><text x="812.8000000000001" y="218" font-size="16" font-weight="600" fill="#042a63" text-anchor="middle">Control</text><text x="812.8000000000001" y="250" font-size="12.5" fill="#5f7283" text-anchor="middle">Owns QC, separate from</text><text x="812.8000000000001" y="268" font-size="12.5" fill="#5f7283" text-anchor="middle">production duties</text>
<text x="884" y="456" font-size="12" fill="#9aa7b4" text-anchor="end">Double Helix Pharma</text>
