<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" height="360" role="img" aria-label="QP vs RP vs RPi: Who Does What">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0aa6e2"/><stop offset="1" stop-color="#2f8f3a"/>
    </linearGradient>
  </defs>
  <rect x="0.5" y="0.5" width="799" height="359" rx="16" fill="#ffffff" stroke="#d4dde6"/>
  <path d="M0,16 Q0,0 16,0 H784 Q800,0 800,16 V96 H0 Z" fill="#042a63"/>
  <rect x="0" y="92" width="272" height="4" fill="#2f8f3a"/>
  <rect x="272" y="92" width="528" height="4" fill="#0aa6e2"/>
  <text x="40" y="40" font-family="Helvetica, Arial, system-ui, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5" fill="#9fd0ec">CONTRACT QP, RP &amp; RPI</text>
  <text x="40" y="73" font-family="Helvetica, Arial, system-ui, sans-serif" font-size="24" font-weight="700" fill="#ffffff">QP vs RP vs RPi: Who Does What</text>
  <g>
    <circle cx="60" cy="142" r="19" fill="url(#g)"/>
    <text x="60" y="148" text-anchor="middle" font-family="Helvetica, Arial, system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">1</text>
    <text x="98" y="137" font-family="Helvetica, Arial, system-ui, sans-serif" font-size="17" font-weight="700" fill="#042a63">Qualified Person (QP)</text>
    <text x="98" y="159" font-family="Helvetica, Arial, system-ui, sans-serif" font-size="13" fill="#5f7283">Certifies and releases each batch of product to market.</text>
    <line x1="98" y1="176" x2="760" y2="176" stroke="#d4dde6" stroke-width="1"/>
  </g>
  <g>
    <circle cx="60" cy="208" r="19" fill="url(#g)"/>
    <text x="60" y="214" text-anchor="middle" font-family="Helvetica, Arial, system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">2</text>
    <text x="98" y="203" font-family="Helvetica, Arial, system-ui, sans-serif" font-size="17" font-weight="700" fill="#042a63">Responsible Person (RP)</text>
    <text x="98" y="225" font-family="Helvetica, Arial, system-ui, sans-serif" font-size="13" fill="#5f7283">Ensures GDP across storage and distribution for a WDA.</text>
    <line x1="98" y1="242" x2="760" y2="242" stroke="#d4dde6" stroke-width="1"/>
  </g>
  <g>
    <circle cx="60" cy="274" r="19" fill="url(#g)"/>
    <text x="60" y="280" text-anchor="middle" font-family="Helvetica, Arial, system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">3</text>
    <text x="98" y="269" font-family="Helvetica, Arial, system-ui, sans-serif" font-size="17" font-weight="700" fill="#042a63">RP for Import (RPi)</text>
    <text x="98" y="291" font-family="Helvetica, Arial, system-ui, sans-serif" font-size="13" fill="#5f7283">Oversees the import of medicines into Great Britain.</text>
    
  </g>
  <text x="760" y="343" text-anchor="end" font-family="Helvetica, Arial, system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="0.5" fill="#5f7283">DOUBLE HELIX PHARMA UK</text>
</svg>