<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 558" width="800" height="558" role="img" aria-label="Protecting the Distribution Chain">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0aa6e2"/><stop offset="1" stop-color="#2f8f3a"/>
    </linearGradient>
  </defs>
  <rect x="0.5" y="0.5" width="799" height="557" rx="16" fill="#ffffff" stroke="#d4dde6"/>
  <path d="M0,16 Q0,0 16,0 H784 Q800,0 800,16 V96 H0 Z" fill="#042a63"/>
  <rect x="0" y="92" width="272" height="4" fill="#2f8f3a"/>
  <rect x="272" y="92" width="528" height="4" fill="#0aa6e2"/>
  <text x="40" y="40" font-family="Helvetica, Arial, system-ui, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5" fill="#9fd0ec">GDP TRANSPORT &amp; SUPPLY CHAIN</text>
  <text x="40" y="73" font-family="Helvetica, Arial, system-ui, sans-serif" font-size="24" font-weight="700" fill="#ffffff">Protecting the Distribution Chain</text>
  <g>
    <circle cx="60" cy="142" r="19" fill="url(#g)"/>
    <text x="60" y="148" text-anchor="middle" font-family="Helvetica, Arial, system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">1</text>
    <text x="98" y="137" font-family="Helvetica, Arial, system-ui, sans-serif" font-size="17" font-weight="700" fill="#042a63">Qualified partners</text>
    <text x="98" y="159" font-family="Helvetica, Arial, system-ui, sans-serif" font-size="13" fill="#5f7283">Only approved suppliers, hauliers and customers.</text>
    <line x1="98" y1="176" x2="760" y2="176" stroke="#d4dde6" stroke-width="1"/>
  </g>
  <g>
    <circle cx="60" cy="208" r="19" fill="url(#g)"/>
    <text x="60" y="214" text-anchor="middle" font-family="Helvetica, Arial, system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">2</text>
    <text x="98" y="203" font-family="Helvetica, Arial, system-ui, sans-serif" font-size="17" font-weight="700" fill="#042a63">Temperature control</text>
    <text x="98" y="225" font-family="Helvetica, Arial, system-ui, sans-serif" font-size="13" fill="#5f7283">Mapped, monitored and alarmed throughout transit.</text>
    <line x1="98" y1="242" x2="760" y2="242" stroke="#d4dde6" stroke-width="1"/>
  </g>
  <g>
    <circle cx="60" cy="274" r="19" fill="url(#g)"/>
    <text x="60" y="280" text-anchor="middle" font-family="Helvetica, Arial, system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">3</text>
    <text x="98" y="269" font-family="Helvetica, Arial, system-ui, sans-serif" font-size="17" font-weight="700" fill="#042a63">Secure transport</text>
    <text x="98" y="291" font-family="Helvetica, Arial, system-ui, sans-serif" font-size="13" fill="#5f7283">Routes and handovers that prevent loss or tampering.</text>
    <line x1="98" y1="308" x2="760" y2="308" stroke="#d4dde6" stroke-width="1"/>
  </g>
  <g>
    <circle cx="60" cy="340" r="19" fill="url(#g)"/>
    <text x="60" y="346" text-anchor="middle" font-family="Helvetica, Arial, system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">4</text>
    <text x="98" y="335" font-family="Helvetica, Arial, system-ui, sans-serif" font-size="17" font-weight="700" fill="#042a63">Documentation</text>
    <text x="98" y="357" font-family="Helvetica, Arial, system-ui, sans-serif" font-size="13" fill="#5f7283">Full traceability from dispatch to delivery.</text>
    <line x1="98" y1="374" x2="760" y2="374" stroke="#d4dde6" stroke-width="1"/>
  </g>
  <g>
    <circle cx="60" cy="406" r="19" fill="url(#g)"/>
    <text x="60" y="412" text-anchor="middle" font-family="Helvetica, Arial, system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">5</text>
    <text x="98" y="401" font-family="Helvetica, Arial, system-ui, sans-serif" font-size="17" font-weight="700" fill="#042a63">Risk management</text>
    <text x="98" y="423" font-family="Helvetica, Arial, system-ui, sans-serif" font-size="13" fill="#5f7283">Assess and mitigate the weak points in the chain.</text>
    <line x1="98" y1="440" x2="760" y2="440" stroke="#d4dde6" stroke-width="1"/>
  </g>
  <g>
    <circle cx="60" cy="472" r="19" fill="url(#g)"/>
    <text x="60" y="478" text-anchor="middle" font-family="Helvetica, Arial, system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">6</text>
    <text x="98" y="467" font-family="Helvetica, Arial, system-ui, sans-serif" font-size="17" font-weight="700" fill="#042a63">Recall readiness</text>
    <text x="98" y="489" font-family="Helvetica, Arial, system-ui, sans-serif" font-size="13" fill="#5f7283">Be able to act fast and completely when needed.</text>
    
  </g>
  <text x="760" y="541" text-anchor="end" font-family="Helvetica, Arial, system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="0.5" fill="#5f7283">DOUBLE HELIX PHARMA UK</text>
</svg>