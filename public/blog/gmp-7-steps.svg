    <text x="98" y="467" font-family="Helvetica, Arial, system-ui, sans-serif" font-size="17" font-weight="700" fill="#042a63">Mock inspection</text>
    <text x="98" y="489" font-family="Helvetica, Arial, system-ui, sans-serif" font-size="13" fill="#5f7283">A realistic dry run, ideally led independently.</text>
